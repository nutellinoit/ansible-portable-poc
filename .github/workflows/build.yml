name: Build portable Ansible bundle

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - os: darwin
            arch: arm64
            runner: macos-14
          # darwin/amd64 is cross-built on the arm runner via Rosetta 2 (macos-14 ships it),
          # avoiding the scarce/slow Intel macos-13 runners.
          - os: darwin
            arch: amd64
            runner: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Build bundle
        env:
          # Name the tarball by the release version (the git tag on tag builds, else the
          # branch name for manual dispatch).
          BUNDLE_VERSION: ${{ github.ref_name }}
        run: mise run build -- ${{ matrix.os }} ${{ matrix.arch }}

      - name: Locate tarball
        id: tarball
        run: echo "name=$(ls ansible-portable-*-${{ matrix.os }}-${{ matrix.arch }}.tar.gz)" >> "$GITHUB_OUTPUT"

      - name: Smoke test (relocated)
        run: mise run test -- "${{ steps.tarball.outputs.name }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ansible-portable-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            ansible-portable-*-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
            ansible-portable-*-${{ matrix.os }}-${{ matrix.arch }}.tar.gz.sha256
          if-no-files-found: error

  release:
    name: release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Aggregate checksums
        working-directory: artifacts
        run: |
          cat *.tar.gz.sha256 > SHA256SUMS
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS

      - name: Generate release notes (with kfd.yaml snippet)
        working-directory: artifacts
        env:
          TAG: ${{ github.ref_name }}
        run: |
          {
            echo "Self-contained, relocatable Ansible bundle (CPython + ansible-core + collections)."
            echo "Download a tarball and run \`python3 <bundle>/python/bin/ansible-playbook ...\` — no host Ansible required."
            echo
            echo "## Pin in the distribution \`kfd.yaml\` (under \`tools.common.ansible\`)"
            echo
            echo '```yaml'
            echo "    ansible:"
            echo "      version: ${TAG}"
            echo "      checksums:"
            while read -r hash file; do
              case "$file" in
                ansible-portable-*.tar.gz)
                  base="${file%.tar.gz}"; arch="${base##*-}"; rest="${base%-*}"; os="${rest##*-}"
                  printf '        %s: "%s"\n' "${os}-${arch}" "$hash"
                  ;;
              esac
            done < SHA256SUMS | sort
            echo '```'
            echo
            echo "furyctl verifies each downloaded bundle against the pinned per-arch SHA-256."
          } > RELEASE_NOTES.md
          echo "=== RELEASE_NOTES.md ===" && cat RELEASE_NOTES.md

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: artifacts/RELEASE_NOTES.md
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS
